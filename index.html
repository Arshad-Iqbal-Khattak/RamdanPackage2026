<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمضان پیکج 2026 - ضلع کرک</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Noto Nastaliq Urdu',serif;background:url("ramzan-bg.png") center/cover no-repeat fixed;min-height:100vh;color:white;display:flex;flex-direction:column;align-items:center;}
.header{width:100%;max-width:480px;background:linear-gradient(#0c7c3a,#065628);padding:8px 6px;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 12px 12px;box-shadow:0 5px 20px rgba(0,0,0,.4);}
.header img.logo{width:28%;}
.header img.moon{width:22%;}
.header-text{flex:1;text-align:center;color:white;}
.header-text h1{margin:0;font-size:24px;}
.header-text p{margin:0;font-size:20px;}
.main{max-width:480px;width:92%;text-align:center;margin-top:20px;}
.main h2{font-size:28px;margin:10px 0 6px;}
.main p{font-size:16px;}
.input-container{background:white;border-radius:12px;padding:12px 15px;display:flex;align-items:center;gap:12px;margin-top:20px;box-shadow:0 8px 25px rgba(0,0,0,.3);}
.input-container img{width:32px;}
input{flex:1;border:none;outline:none;font-size:18px;text-align:center;letter-spacing:2px;background:transparent;}
button{margin-top:15px;width:100%;padding:14px;font-size:18px;background:linear-gradient(#0c7c3a,#065628);border:none;border-radius:8px;color:white;cursor:pointer;}
button:hover{box-shadow:0 0 20px #2ecc71;}
.notice{background:#ffffffdd;color:#333;padding:12px;border-radius:10px;margin-top:15px;font-size:14px;}
footer{margin-top:20px;text-align:center;font-size:14px;line-height:1.4;}
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:999;}
.popup-box{background:#1d2a3c;width:90%;max-width:420px;padding:25px;border-radius:14px;text-align:center;color:white;}
.icon-success{font-size:70px;color:#38a169;}
.icon-fail{font-size:70px;color:#e53e3e;}
.popup-details{margin:15px 0;border-top:1px solid #fff3;padding-top:10px;}
.popup-row{display:flex;justify-content:space-between;margin:6px 0;}
.close-btn{background:#666;color:white;padding:10px;border-radius:8px;width:48%;}
.share-btn{background:#2b66d9;color:white;padding:10px;border-radius:8px;width:48%;}
</style>
</head>
<body>

<!-- Green Header with KPK Logo + Moon (exactly like original) -->
<div class="header">
  <img src="KP_logo.png" class="logo" alt="KPK Logo">
  <div class="header-text">
    <h1>حکومت خیبر پختونخوا</h1>
    <p>رمضان پیکج - ضلع کرک</p>
  </div>
  <img src="moon.png" class="moon" alt="Moon">
</div>

<div class="main">
  <h2>اپنی اہلیت چیک کریں</h2>
  <p>اپنا 13 ہندسوں کا شناختی کارڈ نمبر درج کریں</p>
  
  <!-- Input field INSIDE white box (fixed) -->
  <div class="input-container">
    <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="Person">
    <input type="text" id="cnicInput" maxlength="15" placeholder="شناختی کارڈ نمبر">
  </div>
  
  <button onclick="handleSearch()">اسٹیٹس چیک کریں</button>
</div>

<div class="notice">
  یہ معلوماتی سہولت آپ کی جانب سے عوام کے لیے بنائی گئی ہے۔<br>
  خصوصی شکریہ
</div>

<footer>
 <br>
  <strong>تیار کردہ: Dr. Arshad Iqbal (DC Karak)</strong><br>
  Created by Dr. Arshad Iqbal (DC Karak)
</footer>

<!-- Popup -->
<div id="popupOverlay" class="popup-overlay">
  <div class="popup-box">
    <div id="popupIcon"></div>
    <h2 id="popupTitle"></h2>
    <p id="popupMessage"></p>
    <div id="popupDetails" class="popup-details"></div>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="close-btn" onclick="closePopup()">بند کریں</button>
      <button class="share-btn" onclick="shareResult()">شیئر کریں</button>
    </div>
  </div>
</div>

<script>
// Load Excel
let excelData = [];
window.onload = async () => {
  const res = await fetch('payment.xlsx');
  const ab = await res.arrayBuffer();
  const wb = XLSX.read(ab, {type:'array'});
  excelData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
};

function handleSearch() {
  let cnic = document.getElementById('cnicInput').value.trim().replace(/-/g,'');
  if (cnic.length !== 13) return alert("13 ہندسوں کا شناختی کارڈ نمبر درج کریں");

  const record = excelData.find(r => String(r.cnic).trim() === cnic);

  if (record) {
    document.getElementById('popupOverlay').style.display = 'flex';
    document.getElementById('popupIcon').innerHTML = '<div class="icon-success">✅</div>';
    document.getElementById('popupTitle').innerText = 'مبارک ہو!';
    document.getElementById('popupMessage').innerText = 'آپ رمضان پیکج کے مستحق ہیں۔ آپ 12,500 روپے وصول کر سکتے ہیں۔';
    document.getElementById('popupDetails').innerHTML = `
      <div class="popup-row"><span>نام:</span><span>${record.name}</span></div>
      <div class="popup-row"><span>شناختی کارڈ:</span><span>${record.cnic}</span></div>
      <div class="popup-row"><span>موبائل:</span><span>${record.mobile || '—'}</span></div>`;
  } else {
    document.getElementById('popupOverlay').style.display = 'flex';
    document.getElementById('popupIcon').innerHTML = '<div class="icon-fail">❌</div>';
    document.getElementById('popupTitle').innerText = 'معذرت';
    document.getElementById('popupMessage').innerText = 'آپ کا نام فہرست میں نہیں ملا۔';
  }
}

function closePopup() {
  document.getElementById('popupOverlay').style.display = 'none';
  document.getElementById('cnicInput').value = '';
}

function shareResult() {
  alert('معلومات کاپی ہو گئیں! (WhatsApp/Facebook پر شیئر کریں)');
}

// Auto format CNIC
document.getElementById('cnicInput').addEventListener('input', function() {
  let v = this.value.replace(/\D/g,'');
  if(v.length>13) v=v.slice(0,13);
  this.value = v.replace(/(\d{5})(\d{7})(\d{1})/, '$1-$2-$3');
});
</script>
</body>
</html>
